</head>
<body>
  <div class="container">
    <header>
      <span class="logo-provisoria">Q</span>
      <nav class="menu">
        <a href="index.html">Início</a>
        <a href="event-form.html">Cadastrar Evento</a>
        <a href="sobre.html">Sobre</a>
        <a href="contato.html">Contato</a>
        <a href="meus-eventos.html">Seus Eventos</a>
        <a href="login.html">Login</a>
        <a href="cadastro.html">Cadastro</a>
      </nav>
      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </header>
    
    <nav class="mobile-menu" id="mobile-menu">
      <a href="index.html">Início</a>
      <a href="event-form.html">Cadastrar Evento</a>
      <a href="sobre.html">Sobre</a>
      <a href="contato.html">Contato</a>
      <a href="meus-eventos.html">Seus Eventos</a>
      <a href="login.html">Login</a>
      <a href="cadastro.html">Cadastro</a>
    </nav>
    <main>
      <section id="meus-eventos-cards" class="event-grid">
        <p style="color: #aaa; margin: 24px 0;">Carregando seus eventos...</p>
      </section>
    </main>
  </div>

  <div id="confirm-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content confirm-modal">
      <div class="modal-body">
        <h2 class="modal-title">Confirmar exclusão</h2>
        <p id="confirm-delete-message">Tem certeza que deseja excluir este evento? Esta ação não pode ser desfeita.</p>
        <div class="confirm-actions">
          <button id="confirm-delete-no" class="btn cancel-btn" type="button">Cancelar</button>
          <button id="confirm-delete-yes" class="btn delete-btn" type="button">Excluir evento</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Ícone de perfil fixo -->
  <div id="icone-perfil" title="Meu Perfil" onclick="irParaPerfil()" style="cursor: pointer; text-decoration: none;">
    <img id="icone-perfil-img" src="caminho-da-sua-foto.jpg" alt="Foto do Perfil">
  </div>

  <script src="global.js?v=20260409"></script>
  <script src="theme.js?v=20260409"></script>
  <script src="meus-eventos.js?v=20260409"></script>
  <script src="hamburger-menu.js?v=20260409"></script>
