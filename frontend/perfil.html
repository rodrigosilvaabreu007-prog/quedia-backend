<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Perfil - Quedia.com.br</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="theme.css">
</head>
<body>
  <div class="container">
    <header>
      <span class="logo-provisoria">Q</span>
      <nav class="menu">
        <a href="index.html">Início</a>
        <a href="event-form.html">Cadastrar Evento</a>
        <a href="sobre.html">Sobre</a>
        <a href="contato.html">Contato</a>
        <a href="meus-eventos.html">Seus Eventos</a>
        <a href="login.html">Login</a>
        <a href="cadastro.html">Cadastro</a>
      </nav>
      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </header>
    
    <nav class="mobile-menu" id="mobile-menu">
      <a href="index.html">Início</a>
      <a href="event-form.html">Cadastrar Evento</a>
      <a href="sobre.html">Sobre</a>
      <a href="contato.html">Contato</a>
      <a href="meus-eventos.html">Seus Eventos</a>
      <a href="login.html">Login</a>
      <a href="cadastro.html">Cadastro</a>
    </nav>
    <main>
      <div id="conteudo-perfil">
        <!-- Será preenchido pelo JavaScript -->
      </div>
    </main>
  </div>

  <!-- Modal de edição de perfil -->
  <div id="modal-editar" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; display: none; align-items: center; justify-content: center;">
    <div style="background: var(--bg-primary, #0f1419); border: 2px solid var(--cor-principal, #00bfff); border-radius: 12px; padding: 32px; width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; position: relative;">
      <button type="button" onclick="fecharModalEditar()" style="position: absolute; top: 12px; right: 12px; width: 36px; height: 36px; min-width: 36px; min-height: 36px; padding: 0; line-height: 1; font-size: 20px; background: rgba(0, 191, 255, 0.16); border: 1px solid var(--cor-principal, #00bfff); border-radius: 6px; color: var(--cor-principal, #00bfff); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; box-sizing: border-box;" class="btn btn-icon">✕</button>
      
      <h2 style="margin-top: 0; color: var(--text-primary, #00bfff);">Editar Perfil</h2>
      <form id="form-editar" style="display: grid; gap: 16px;">
        <label style="display: grid;">
          Nome
          <input type="text" id="editar-nome" style="padding: 12px; border: 1px solid var(--cor-principal, #00bfff); border-radius: 4px; background: var(--bg-secondary, #1a2332); color: var(--text-color, #fff); margin-top: 6px;" required>
        </label>

        <label style="display: grid;">
          Email
          <input type="email" id="editar-email" style="padding: 12px; border: 1px solid var(--cor-principal, #00bfff); border-radius: 4px; background: var(--bg-secondary, #1a2332); color: var(--text-color, #fff); margin-top: 6px;" required>
        </label>

        <label style="display: grid;">
          Estado
          <select id="editar-estado" style="padding: 12px; border: 1px solid var(--cor-principal, #00bfff); border-radius: 4px; background: var(--bg-secondary, #1a2332); color: var(--text-color, #fff); margin-top: 6px;" required>
            <option value="">Selecione um estado</option>
          </select>
        </label>
        
        <label style="display: grid;">
          Cidade
          <select id="editar-cidade" style="padding: 12px; border: 1px solid var(--cor-principal, #00bfff); border-radius: 4px; background: var(--bg-secondary, #1a2332); color: var(--text-color, #fff); margin-top: 6px;" required>
            <option value="">Selecione primeiro um estado</option>
          </select>
        </label>
        
        <div id="editar-preferencias-container" style="display: grid;"></div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px;">
          <button type="button" onclick="fecharModalEditar()" class="btn btn-secondary">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar Alterações</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal de confirmação de exclusão -->
  <div id="modal-deletar" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; display: none; align-items: center; justify-content: center;">
    <div style="background: var(--bg-primary, #0f1419); border: 2px solid #ff4444; border-radius: 12px; padding: 32px; width: 90%; max-width: 400px; text-align: center; position: relative;">
      <button type="button" onclick="fecharModalDeletar()" style="position: absolute; top: 12px; right: 12px; width: 36px; height: 36px; min-width: 36px; min-height: 36px; padding: 0; line-height: 1; font-size: 18px; background: rgba(255, 68, 68, 0.2); border: 1px solid #ff4444; border-radius: 6px; color: #ff4444; cursor: pointer; display: flex; align-items: center; justify-content: center; box-sizing: border-box;" class="btn btn-icon">✕</button>
      
      <h2 style="margin-top: 0; color: #ff4444;">Deletar Conta</h2>
      <p style="color: #aaa; margin: 24px 0;">Tem certeza que deseja deletar sua conta? Esta ação é irreversível e todos os seus dados serão removidos.</p>
      
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
        <button type="button" onclick="fecharModalDeletar()" class="btn btn-secondary">Cancelar</button>
        <button type="button" onclick="confirmarDelecao()" class="btn btn-danger">Deletar Conta</button>
      </div>
    </div>
  </div>

  <script src="global.js"></script>
  <script src="theme.js"></script>
  <script src="cidades-brasil.js"></script>
  <script src="categorias.js"></script>
  <script src="perfil.js"></script>
  <script src="hamburger-menu.js"></script>
</body>
</html>
