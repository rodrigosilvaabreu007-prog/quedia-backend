<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Teste de Funcionalidades</title>
  <style>
    body { font-family: Arial; margin: 20px; background: #181a20; color: #fff; }
    .test { margin: 20px 0; padding: 15px; background: #1a2332; border-left: 4px solid #00bfff; border-radius: 8px; }
    .pass { color: #00ff00; font-weight: bold; }
    .fail { color: #ff4444; font-weight: bold; }
    h1 { color: #00bfff; }
  </style>
</head>
<body>
  <h1>🧪 Teste de Funcionalidades do EventHub</h1>
  
  <div class="test">
    <h3>1. Botão Filtro</h3>
    <p>Status: <span id="test-filtro" class="pass">⏳ Testando...</span></p>
    <button onclick="testarToggleFiltros()">Clique para Testar Toggle Filtros</button>
  </div>
  
  <div class="test">
    <h3>2. Botão Perfil</h3>
    <p>Status: <span id="test-perfil" class="pass">⏳ Testando...</span></p>
    <button onclick="testarIrParaPerfil()">Clique para Testar ir para Perfil</button>
  </div>
  
  <div class="test">
    <h3>3. Busca por Gratuito/Gratis</h3>
    <p>Status: <span id="test-busca" class="pass">⏳ Testando...</span></p>
    <button onclick="testarBuscaGratuito()">Clique para Testar Busca</button>
  </div>
  
  <div class="test">
    <h3>4. API Conectada</h3>
    <p>Status: <span id="test-api" class="pass">⏳ Testando...</span></p>
  </div>

  <script>
    function testarToggleFiltros() {
      const resultado = typeof window.toggleFiltros === 'function' ? 'PASS ✓' : 'FAIL ✗';
      document.getElementById('test-filtro').innerHTML = 
        resultado === 'PASS ✓' ? 
          '<span class="pass">✓ Função toggleFiltros disponível</span>' :
          '<span class="fail">✗ Função toggleFiltros não disponível</span>';
      
      if (resultado === 'PASS ✓') {
        window.toggleFiltros();
        console.log('✓ toggleFiltros foi chamado');
      }
    }
    
    function testarIrParaPerfil() {
      const resultado = typeof window.irParaPerfil === 'function' ? 'PASS ✓' : 'FAIL ✗';
      document.getElementById('test-perfil').innerHTML = 
        resultado === 'PASS ✓' ? 
          '<span class="pass">✓ Função irParaPerfil disponível</span>' :
          '<span class="fail">✗ Função irParaPerfil não disponível</span>';
      
      if (resultado === 'PASS ✓') {
        console.log('✓ irParaPerfil existe e pode ser chamada');
      }
    }
    
    function testarBuscaGratuito() {
      const resultado = typeof window.filtrarEventos === 'function' ? 'PASS ✓' : 'FAIL ✗';
      document.getElementById('test-busca').innerHTML = 
        resultado === 'PASS ✓' ? 
          '<span class="pass">✓ Função filtrarEventos disponível</span>' :
          '<span class="fail">✗ Função filtrarEventos não disponível</span>';
    }
    
    // Testar API ao carregar a página
    fetch('/api/eventos')
      .then(r => r.json())
      .then(d => {
        document.getElementById('test-api').innerHTML = 
          '<span class="pass">✓ API retornou dados: ' + (Array.isArray(d) ? d.length + ' eventos' : 'objeto válido') + '</span>';
      })
      .catch(e => {
        // Tentar com window.API_URL
        if (window.API_URL) {
          fetch(window.API_URL + '/eventos')
            .then(r => r.json())
            .then(d => {
              document.getElementById('test-api').innerHTML = 
                '<span class="pass">✓ API respondendo em: ' + window.API_URL + '</span>';
            })
            .catch(e2 => {
              document.getElementById('test-api').innerHTML = 
                '<span class="fail">✗ Erro ao conectar API: ' + e2.message + '</span>';
            });
        } else {
          document.getElementById('test-api').innerHTML = 
            '<span class="fail">✗ API_URL não definida</span>';
        }
      });
    
    // Testes automáticos ao carregar
    window.addEventListener('load', () => {
      console.log('🧪 Iniciando testes...');
      console.log('window.toggleFiltros:', typeof window.toggleFiltros);
      console.log('window.irParaPerfil:', typeof window.irParaPerfil);
      console.log('window.setView:', typeof window.setView);
      console.log('window.filtrarEventos:', typeof window.filtrarEventos);
      console.log('window.API_URL:', window.API_URL);
      
      // Chamar testes
      setTimeout(() => {
        testarToggleFiltros();
        testarIrParaPerfil();
        testarBuscaGratuito();
      }, 1000);
    });
  </script>
</body>
</html>
