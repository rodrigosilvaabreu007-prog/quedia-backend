<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastrar Evento - EventHub</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="theme.css">
</head>
<body>
  <div class="container">
    <header>
      <span class="logo-provisoria">EH</span>
      <nav class="menu">
        <a href="index.html">Início</a>
        <a href="event-form.html">Cadastrar Evento</a>
        <a href="sobre.html">Sobre</a>
        <a href="contato.html">Contato</a>
        <a href="meus-eventos.html">Seus Eventos</a>
        <a href="login.html">Login</a>
        <a href="cadastro.html">Cadastro</a>
      </nav>
    </header>

    <main>
      <form id="cadastro-evento" class="card-form">
        <label>Nome do evento <input type="text" id="nome" required></label>
        <label>Descrição <textarea id="descricao" required></textarea></label>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
          <label>Estado 
            <select id="evento-estado" required onchange="window.atualizarCidades()"></select>
          </label>
          <label>Cidade 
            <select id="evento-cidade" required disabled><option value="">Selecione o estado</option></select>
          </label>
        </div>

        <label>Endereço / Local <input type="text" id="endereco" required></label>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
          <label>Data <input type="date" id="data" required></label>
          <label>Horário <input type="time" id="horario" required></label>
        </div>

        <label>Categorias</label>
        <div id="categorias-evento" class="categorias-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;"></div>

        <fieldset class="form-section">
          <legend>Entrada</legend>
          <label><input type="radio" name="gratuito" id="gratuito-sim" checked onchange="window.togglePreco()"> Gratuito</label>
          <label><input type="radio" name="gratuito" id="gratuito-nao" onchange="window.togglePreco()"> Pago</label>
          <div id="container-preco" style="display: none; margin-top: 10px;">
            <input type="number" id="preco" placeholder="Preço R$" step="0.01" value="0">
          </div>
        </fieldset>

        <fieldset class="form-section">
          <legend>Imagem do Evento</legend>
          <input type="file" id="imagens" accept="image/*" onchange="window.mostrarPreviewImagens()">
          <div id="preview-imagens" style="margin-top: 10px;"></div>
        </fieldset>

        <button type="submit" id="btn-submit">🚀 PUBLICAR EVENTO</button>
      </form>
      <div id="mensagem-evento" style="margin-top: 20px; text-align: center; font-weight: bold;"></div>
    </main>
  </div>

  <div id="icone-perfil" title="Meu Perfil" onclick="irParaPerfil()" style="cursor: pointer; text-decoration: none;">
    <img id="icone-perfil-img" src="caminho-da-sua-foto.jpg" alt="Foto do Perfil">
  </div>

  <script src="theme.js"></script>
  <script src="global.js"></script>
  <script src="event-form.js"></script>
</body>
</html>
