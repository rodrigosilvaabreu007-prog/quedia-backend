<!DOCTYPE html>
<html>
<head>
<title>Teste Cadastro API</title>
<style>
  body { font-family: Arial; margin: 20px; background: #222; color: #fff; }
  button { padding: 10px 20px; background: #00bfff; color: #000; border: none; cursor: pointer; font-weight: bold; }
  button:hover { background: #0099cc; }
  #resultado { margin-top: 20px; padding: 15px; background: #333; border-radius: 5px; white-space: pre-wrap; font-family: monospace; }
</style>
</head>
<body>
<h1>🧪 Teste de Cadastro</h1>
<p>Clique no botão abaixo para testar a API de cadastro</p>
<button onclick="testarCadastro()">Testar Cadastro</button>
<div id="resultado"></div>

<script>
async function testarCadastro() {
  const div = document.getElementById('resultado');
  div.innerHTML = '⏳ Testando cadastro...';
  
  const email = 'teste' + Math.random().toString(36).substring(7) + '@example.com';
  
  try {
    console.log('Enviando POST para https://quedia-api-649702844549.southamerica-east1.run.app/api/cadastro');
    const resp = await fetch('https://quedia-api-649702844549.southamerica-east1.run.app/api/cadastro', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        nome: 'User Test ' + new Date().getTime(),
        email: email,
        senha: 'senha123456',
        estado: 'SP',
        cidade: 'São Paulo',
        preferencias: ['Tecnologia']
      })
    });
    
    console.log('Resposta:', resp.status, resp.statusText);
    const data = await resp.json();
    
    div.innerHTML = `✅ Status: ${resp.status} ${resp.statusText}
    
${JSON.stringify(data, null, 2)}`;
    
  } catch (err) {
    console.error('Erro completo:', err);
    div.innerHTML = `❌ Erro ao fazer requisição:
    
${err.message}
${err.stack}`;
  }
}
</script>
</body>
</html>
