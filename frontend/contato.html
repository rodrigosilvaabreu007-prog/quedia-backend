      <h1 class="logo">Contato</h1>
    </header>
    <main>
      <div style="display: flex; gap: 48px; align-items: flex-start;">
        <div style="flex: 1;">
          <h2>Entre em Contato</h2>
          <p>Tem uma dúvida ou sugestão? Envie-nos uma mensagem! Responderemos em breve.</p>
          <p>Estamos aqui para ajudar e melhorar continuamente a plataforma.</p>
        </div>
        <form id="contato-form" class="card-form" style="flex: 1;">
          <label>Nome<input type="text" name="nome" required></label>
          <label>Email<input type="email" name="email" required></label>
          <label>Mensagem<textarea name="mensagem" required></textarea></label>
          <button type="submit" class="btn btn-primary btn-form-center">Enviar</button>
        </form>
      </div>
      <div id="mensagem-contato"></div>
    </main>
  </div>

  <div id="icone-perfil" title="Meu Perfil" onclick="irParaPerfil()" style="cursor: pointer; text-decoration: none;">
    <img id="icone-perfil-img" src="caminho-da-sua-foto.jpg">
  </div>
