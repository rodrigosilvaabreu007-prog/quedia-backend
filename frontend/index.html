<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventHub - Agenda de Eventos</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="theme.css">
</head>
<body>
  <div class="container">
    <header>
      <nav class="menu">
        <span class="logo-provisoria">EH</span>
        <a href="index.html">Início</a>
        <a href="event-form.html">Cadastrar Evento</a>
        <a href="sobre.html">Sobre</a>
        <a href="contato.html">Contato</a>
        <a href="meus-eventos.html">Seus Eventos</a>
        <a href="login.html">Login</a>
        <a href="cadastro.html">Cadastro</a>
      </nav>
    </header>

    <div class="hero-section">
      <h1 class="logo">EventHub</h1>
      <p class="subtitle">Descubra e divulgue eventos na sua cidade</p>
    </div>

    <main>
      <div style="margin-bottom: 32px;">
        <input type="text" id="search-input" placeholder="🔍 Buscar por evento, cidade ou categoria..." style="width: 100%; padding: 16px; border: 2px solid var(--cor-principal, #00bfff); border-radius: 8px; background: var(--bg-secondary, #1a2332); color: var(--text-color, #fff); font-size: 16px;">
      </div>

      <div style="margin-bottom: 16px; display: flex; gap: 10px; align-items: center;">
        <button id="toggle-filtros" onclick="window.toggleFiltros()" style="padding: 12px 24px; background: var(--cor-principal, #00bfff); border: none; border-radius: 4px; color: #000; font-weight: 600; cursor: pointer; font-size: 16px;">
          Filtros ▼
        </button>
        <button id="view-eventos" onclick="window.setView('eventos')" style="padding: 12px 24px; background: var(--bg-secondary, #1a2332); border: 2px solid var(--cor-principal, #00bfff); border-radius: 4px; color: var(--text-primary, #fff); font-weight: 600; cursor: pointer; font-size: 16px;">
          📋 Eventos
        </button>
        <button id="view-calendario" onclick="window.setView('calendario')" style="padding: 12px 24px; background: var(--bg-secondary, #1a2332); border: 2px solid var(--cor-principal, #00bfff); border-radius: 4px; color: var(--text-primary, #fff); font-weight: 600; cursor: pointer; font-size: 16px;">
          📅 Calendário
        </button>
      </div>

      <div id="filtros-container" style="display: none; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 32px; padding: 20px; background: rgba(0, 191, 255, 0.05); border-radius: 8px;">
        <div><label style="color: #888; font-size: 12px;">Estado</label><select id="filtro-estado" class="filtro-select"><option value="">Todos</option></select></div>
        <div><label style="color: #888; font-size: 12px;">Cidade</label><select id="filtro-cidade" class="filtro-select"><option value="">Todas</option></select></div>
        <div><label style="color: #888; font-size: 12px;">Categoria</label><select id="filtro-categoria" class="filtro-select"><option value="">Todas</option></select></div>
        <div><label style="color: #888; font-size: 12px;">Preço Máx</label><input type="number" id="filtro-preco" class="filtro-select" placeholder="R$"></div>
        <div><label style="color: #888; font-size: 12px;">Data</label><input type="date" id="filtro-data" class="filtro-select"></div>
        <div><label style="color: #888; font-size: 12px;">Horário</label><input type="time" id="filtro-horario" class="filtro-select"></div>
        <div style="display: flex; align-items: flex-end;"><button onclick="window.limparFiltros()" class="btn-limpar">Limpar</button></div>
      </div>

      <section id="section-para-voce" style="margin-bottom: 48px;">
        <h2 class="section-title">Eventos para Você</h2>
        <div id="eventos-para-voce" class="event-grid"></div>
        <p id="mensagem-para-voce" class="msg-vazia"></p>
      </section>

      <section id="section-todos">
        <h2 class="section-title">Todos os Eventos</h2>
        <div id="event-cards" class="event-grid"></div>
        <p id="mensagem-eventos" class="msg-vazia"></p>
      </section>

      <!-- Calendário View -->
      <section id="section-calendario" style="display: none; margin-bottom: 48px;">
        <h2 class="section-title">Calendário de Eventos</h2>
        <div id="calendario-container"></div>
      </section>
    </main>
  </div>

  <div id="event-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <span class="close-modal" onclick="window.fecharModal()">&times;</span>
      <div id="modal-body"></div>
      <div class="modal-footer">
        <button class="btn-mais-info" onclick="window.irParaDetalhes()">Mais Informações</button>
      </div>
    </div>
  </div>

  <a href="perfil.html" style="text-decoration: none;">
  <div id="icone-perfil" title="Meu Perfil">
    <img id="icone-perfil-img" src="caminho-da-sua-foto.jpg" alt="Foto do Perfil">
  </div>
</a>

  <script src="theme.js"></script>
  <script src="cidades-brasil.js"></script>
  <script src="global.js"></script>
  <script src="evento-list.js"></script>
</body>
</html>
