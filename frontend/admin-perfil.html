<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Perfil Administrativo | QueDia</title>
    <link rel="stylesheet" href="styles.css?v=20260514">
    <link rel="stylesheet" href="theme.css?v=20260514">
    <link rel="icon" href="https://i.imgur.com/YourIcon.png" type="image/png">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <a href="admin-inicio.html">QueDia</a>
            </div>
            <div class="nav-links">
                <a href="admin-inicio.html">Início</a>
                <a href="admin-eventos.html">Aprovações</a>
                <a href="admin-contato.html">Contato</a>
            </div>
            <div class="hamburger-menu" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <main class="container">
        <section class="admin-profile">
            <div class="profile-header">
                <div class="profile-avatar" id="profile-avatar">
                    <span>👤</span>
                </div>
                <div class="profile-info">
                    <h1 id="admin-nome">Carregando...</h1>
                    <p id="admin-email" class="admin-email">Carregando...</p>
                    <span class="admin-badge">Administrador</span>
                </div>
            </div>

            <div class="admin-stats">
                <div class="stat-card">
                    <div class="stat-number" id="stat-pendentes">0</div>
                    <div class="stat-label">Aprovação Pendente</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="stat-mensagens">0</div>
                    <div class="stat-label">Respostas Pendentes</div>
                </div>
            </div>

            <div class="admin-actions">
                <h2>Ações Administrativas</h2>
                <div class="actions-grid">
                    <button onclick="window.location.href='admin-eventos.html'" class="action-btn">
                        <span class="action-icon">✅</span>
                        <span class="action-text">Aprovar Eventos</span>
                    </button>
                    <button onclick="window.location.href='admin-contato.html'" class="action-btn">
                        <span class="action-icon">💬</span>
                        <span class="action-text">Responder Mensagens</span>
                    </button>
                    <button onclick="editarPerfil()" class="action-btn">
                        <span class="action-icon">⚙️</span>
                        <span class="action-text">Editar Perfil</span>
                    </button>
                    <button onclick="logout()" class="btn-secondary">
                        <span class="action-icon">🚪</span>
                        <span class="action-text">Sair</span>
                    </button>
                </div>
            </div>

            <div class="admin-details">
                <h2>Informações Administrativas</h2>
                <div class="details-grid">
                    <div class="detail-item">
                        <label>Última Atividade</label>
                        <span id="ultima-atividade">Carregando...</span>
                    </div>
                    <div class="detail-item">
                        <label>Status</label>
                        <span class="status-ativo">🟢 Ativo</span>
                    </div>
                    <div class="detail-item">
                        <label>Nível de Acesso</label>
                        <span>Administrador Pleno</span>
                    </div>
                    <div class="detail-item">
                        <label>Membro Desde</label>
                        <span id="membro-desde">Carregando...</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="icone-perfil" title="Meu Perfil" onclick="irParaPerfil()" style="cursor: pointer;"></div>

    <!-- Modal de edição de perfil administrativo -->
    <div id="modal-editar" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; display: none; align-items: center; justify-content: center;">
        <div style="background: var(--bg-secondary); border: 2px solid var(--cor-principal); border-radius: 12px; padding: 32px; width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; position: relative;">
            <button type="button" onclick="fecharModalEditar()" style="position: absolute; top: 12px; right: 12px; width: 36px; height: 36px; min-width: 36px; min-height: 36px; padding: 0; line-height: 1; font-size: 20px; background: rgba(var(--cor-principal-rgb), 0.16); border: 1px solid var(--cor-principal); border-radius: 50%; color: var(--cor-principal); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; box-sizing: border-box;" class="btn btn-icon">✕</button>
            <h2 style="margin-top: 0; color: var(--text-primary, #fff);">Editar Perfil</h2>
            <form id="form-editar" style="display: grid; gap: 16px;">
                <label style="display: grid;">
                    Nome
                    <input type="text" id="editar-nome" style="padding: 12px; border: 1px solid var(--cor-principal); border-radius: 4px; background: var(--bg-primary); color: var(--text-color); margin-top: 6px;" required>
                </label>
                <label style="display: grid;">
                    Email
                    <input type="email" id="editar-email" style="padding: 12px; border: 1px solid var(--cor-principal); border-radius: 4px; background: var(--bg-primary); color: var(--text-color); margin-top: 6px;" required>
                </label>
                <label style="display: grid;">
                    Estado
                    <select id="editar-estado" style="padding: 12px; border: 1px solid var(--cor-principal); border-radius: 4px; background: var(--bg-primary); color: var(--text-color); margin-top: 6px;" required>
                        <option value="">Selecione um estado</option>
                    </select>
                </label>
                <label style="display: grid;">
                    Cidade
                    <select id="editar-cidade" style="padding: 12px; border: 1px solid var(--cor-principal); border-radius: 4px; background: var(--bg-primary); color: var(--text-color); margin-top: 6px;" required>
                        <option value="">Selecione primeiro um estado</option>
                    </select>
                </label>
                <div id="editar-preferencias-container" style="display: grid;"></div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px;">
                    <button type="button" onclick="fecharModalEditar()" class="btn btn-secondary">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                </div>
            </form>
        </div>
    </div>

    <style>
        .admin-profile {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 30px;
            background: var(--bg-secondary);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 2px solid var(--cor-principal);
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--cor-principal), var(--cor-principal-hover));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            flex-shrink: 0;
        }

        .profile-info h1 {
            margin: 0 0 10px 0;
            color: var(--text-color);
            font-size: 28px;
        }

        .admin-email {
            color: #888;
            margin-bottom: 10px;
        }

        .admin-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--cor-principal), var(--cor-principal-hover));
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border-left: 4px solid var(--cor-principal);
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: var(--cor-principal);
            margin-bottom: 10px;
        }

        .stat-label {
            color: #888;
            font-size: 14px;
        }

        .admin-actions {
            background: var(--bg-secondary);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .admin-actions h2 {
            margin-top: 0;
            margin-bottom: 20px;
            color: var(--text-color);
        }

        .actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .action-btn {
            background: var(--bg-primary);
            border: 2px solid var(--cor-principal);
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            color: var(--text-color);
        }

        .action-btn:hover {
            background: var(--cor-principal);
            color: white;
            transform: translateY(-5px);
        }

        .action-icon {
            font-size: 32px;
        }

        .action-text {
            font-size: 14px;
            font-weight: bold;
            text-align: center;
        }

        .admin-details {
            background: var(--bg-secondary);
            padding: 30px;
            border-radius: 12px;
        }

        .admin-details h2 {
            margin-top: 0;
            margin-bottom: 20px;
            color: var(--text-color);
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-item label {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .detail-item span {
            color: var(--text-color);
            font-size: 16px;
            font-weight: 500;
        }

        .status-ativo {
            color: #28a745;
            font-weight: bold;
        }
    </style>

    <script src="global.js"></script>
    <script src="cidades-brasil.js?v=20260514"></script>
    <script src="categorias.js?v=20260514"></script>
    <script>
        const API_URL = window.API_URL;

        function logout() {
            localStorage.removeItem('eventhub-token');
            localStorage.removeItem('eventhub-usuario');
            window.location.href = 'login.html';
        }

        function toggleMenu() {
            const navLinks = document.querySelector('.nav-links');
            navLinks.classList.toggle('active');
        }

        let usuarioAtualAdmin = null;

        function getUsuarioId(usuario) {
            if (!usuario) {
                try {
                    const usuarioStorage = JSON.parse(localStorage.getItem('eventhub-usuario') || 'null');
                    return usuarioStorage?.id || usuarioStorage?._id || '';
                } catch {
                    return '';
                }
            }

            const userIdRaw = usuario.id || usuario._id || '';
            if (userIdRaw && typeof userIdRaw === 'object' && typeof userIdRaw.toString === 'function') {
                return userIdRaw.toString();
            }

            return String(userIdRaw || '');
        }

        function normalizarTexto(texto) {
            return String(texto || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim();
        }

        function obterSiglaEstado(valorEstado) {
            const texto = normalizarTexto(valorEstado);
            if (!texto) return '';

            const estados = obterEstados();
            const encontrado = estados.find(estado => {
                return normalizarTexto(estado.sigla) === texto || normalizarTexto(estado.nome) === texto;
            });
            return encontrado ? encontrado.sigla : '';
        }

        function selecionarOpcaoPorTexto(selectElement, textoBuscado) {
            if (!selectElement || !textoBuscado) return;
            const textoNormalizado = normalizarTexto(textoBuscado);
            for (const option of Array.from(selectElement.options)) {
                if (normalizarTexto(option.value) === textoNormalizado || normalizarTexto(option.textContent) === textoNormalizado) {
                    selectElement.value = option.value;
                    return;
                }
            }
        }

        function editarPerfil() {
            abrirModalEditar();
        }

        async function carregarDadosAdmin() {
            try {
                const token = localStorage.getItem('eventhub-token');
                const usuario = JSON.parse(localStorage.getItem('eventhub-usuario') || '{}');

                if (!token || usuario.cargo !== 'adm') {
                    window.location.href = 'login.html';
                    return;
                }

                // Preencher informações básicas
                document.getElementById('admin-nome').textContent = usuario.nome || 'Administrador';
                document.getElementById('admin-email').textContent = usuario.email || 'email@example.com';

                // Carregar estatísticas reais do backend
                const [eventosResponse, mensagensResponse] = await Promise.all([
                    fetch(`${API_URL}/admin/eventos`, { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch(`${API_URL}/admin/mensagens`, { headers: { 'Authorization': `Bearer ${token}` } })
                ]);

                let fallbackStats = null;
                if (!eventosResponse.ok || !mensagensResponse.ok) {
                    const statsResponse = await fetch(`${API_URL}/admin/stats`, { headers: { 'Authorization': `Bearer ${token}` } });
                    if (statsResponse.ok) {
                        fallbackStats = await statsResponse.json();
                    }
                }

                if (eventosResponse.ok) {
                    const eventos = await eventosResponse.json();
                    document.getElementById('stat-pendentes').textContent = Array.isArray(eventos) ? eventos.length : 0;
                } else if (fallbackStats) {
                    document.getElementById('stat-pendentes').textContent = Number(fallbackStats.eventosPendentes || 0);
                } else {
                    console.warn('Erro ao carregar eventos pendentes:', eventosResponse.status);
                    document.getElementById('stat-pendentes').textContent = '0';
                }

                if (mensagensResponse.ok) {
                    const mensagens = await mensagensResponse.json();
                    document.getElementById('stat-mensagens').textContent = Array.isArray(mensagens) ? mensagens.length : 0;
                } else if (fallbackStats) {
                    document.getElementById('stat-mensagens').textContent = Number(fallbackStats.respostasPendentes || fallbackStats.totalMensagens || 0);
                } else {
                    console.warn('Erro ao carregar mensagens:', mensagensResponse.status);
                    document.getElementById('stat-mensagens').textContent = '0';
                }

                // Formato de datas
                const agora = new Date();
                document.getElementById('ultima-atividade').textContent = agora.toLocaleString('pt-BR');
                document.getElementById('membro-desde').textContent = usuario.criadoEm ? 
                    new Date(usuario.criadoEm).toLocaleDateString('pt-BR') : 
                    'Sem data';
            } catch (error) {
                console.error('Erro ao carregar dados:', error);
            }
        }

        function abrirModalEditar() {
            const token = localStorage.getItem('eventhub-token');
            const usuario = JSON.parse(localStorage.getItem('eventhub-usuario') || '{}');

            if (!token || usuario.cargo !== 'adm') {
                window.location.href = 'login.html';
                return;
            }

            usuarioAtualAdmin = usuario;
            document.getElementById('editar-nome').value = usuarioAtualAdmin.nome || '';
            document.getElementById('editar-email').value = usuarioAtualAdmin.email || '';

            preencherEstadosEditar();
            const estadoSelecionado = obterSiglaEstado(usuarioAtualAdmin.estado || '');
            const estadoSelect = document.getElementById('editar-estado');
            estadoSelect.value = estadoSelecionado || '';
            if (!estadoSelecionado && usuarioAtualAdmin.estado) {
                selecionarOpcaoPorTexto(estadoSelect, usuarioAtualAdmin.estado);
            }

            const estadoAtual = estadoSelect.value;
            if (estadoAtual) {
                atualizarCidadesEditar(estadoAtual);
                setTimeout(() => {
                    selecionarOpcaoPorTexto(document.getElementById('editar-cidade'), usuarioAtualAdmin.cidade || '');
                }, 10);
            }

            preencherPreferenciasEditar();
            document.getElementById('modal-editar').style.display = 'flex';
        }

        function preencherPreferenciasEditar() {
            const container = document.getElementById('editar-preferencias-container');
            if (!container) return;

            let preferenciasAtuais = [];
            if (usuarioAtualAdmin?.preferencias) {
                if (typeof usuarioAtualAdmin.preferencias === 'string') {
                    try {
                        preferenciasAtuais = JSON.parse(usuarioAtualAdmin.preferencias);
                    } catch {
                        preferenciasAtuais = [];
                    }
                } else if (Array.isArray(usuarioAtualAdmin.preferencias)) {
                    preferenciasAtuais = usuarioAtualAdmin.preferencias;
                }
            }

            container.innerHTML = '';
            const categoriasDiv = document.createElement('div');
            categoriasDiv.style.cssText = 'display: block;';

            const subcategoriaLabel = document.createElement('label');
            subcategoriaLabel.textContent = 'Preferências de Categorias:';
            subcategoriaLabel.style.cssText = 'display: block; margin-bottom: 8px; color: #aaa; font-size: 12px; text-transform: uppercase;';

            const subcategoriaContainer = document.createElement('div');
            subcategoriaContainer.id = 'editar-preferencia-subcategorias';

            categoriasDiv.appendChild(subcategoriaLabel);
            categoriasDiv.appendChild(subcategoriaContainer);
            container.appendChild(categoriasDiv);

            if (typeof inicializarSeletorCategorias === 'function') {
                inicializarSeletorCategorias('editar-preferencia-subcategorias', preferenciasAtuais);
            }
        }

        function preencherEstadosEditar() {
            const select = document.getElementById('editar-estado');
            while (select.options.length > 1) {
                select.remove(1);
            }

            const estados = obterEstados();
            estados.forEach(estado => {
                const option = document.createElement('option');
                option.value = estado.sigla;
                option.textContent = estado.nome;
                select.appendChild(option);
            });

            select.onchange = (e) => {
                atualizarCidadesEditar(e.target.value);
            };
        }

        function atualizarCidadesEditar(estado) {
            const select = document.getElementById('editar-cidade');
            select.innerHTML = '<option value="">Selecione uma cidade</option>';

            if (!estado) {
                select.disabled = true;
                return;
            }

            const cidades = obterCidades(estado);
            cidades.forEach(cidade => {
                const option = document.createElement('option');
                option.value = cidade;
                option.textContent = cidade;
                select.appendChild(option);
            });

            select.disabled = false;
        }

        async function salvarAlteracoes(event) {
            event.preventDefault();

            const token = localStorage.getItem('eventhub-token');
            if (!token) {
                window.showNotification('Você precisa estar logado para editar o perfil.', 'error');
                window.location.href = 'login.html';
                return;
            }

            const nome = document.getElementById('editar-nome').value.trim();
            const email = document.getElementById('editar-email').value.trim();
            const estado = document.getElementById('editar-estado').value;
            const cidade = document.getElementById('editar-cidade').value;

            if (!nome || !email || !estado || !cidade) {
                window.showNotification('Por favor, preencha todos os campos obrigatórios.', 'error');
                return;
            }

            const checkboxesSelecionados = document.querySelectorAll('input[name^="subcat-"]:checked');
            const preferencias = Array.from(checkboxesSelecionados).map(cb => cb.value);

            const dadosAtualizados = {
                nome,
                email,
                estado,
                cidade,
                preferencias
            };

            try {
                const usuarioId = getUsuarioId(usuarioAtualAdmin);
                if (!usuarioId) {
                    throw new Error('ID do usuário não encontrado. Recarregue a página.');
                }

                const resposta = await fetch(`${API_URL}/usuario/${usuarioId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(dadosAtualizados)
                });

                if (tratarErroAutenticacao(resposta)) return;

                if (!resposta.ok) {
                    const data = await resposta.json().catch(() => null);
                    const mensagem = data?.erro || data?.mensagem || 'Erro ao atualizar perfil.';
                    throw new Error(mensagem);
                }

                const usuarioAtualizado = await resposta.json();
                usuarioAtualAdmin = usuarioAtualizado;
                localStorage.setItem('eventhub-usuario', JSON.stringify(usuarioAtualizado));
                fecharModalEditar();
                carregarDadosAdmin();
                window.showNotification('Perfil atualizado com sucesso!', 'success');
            } catch (error) {
                console.error('Erro ao salvar alterações:', error);
                window.showNotification(error.message || 'Erro ao atualizar perfil.', 'error');
            }
        }

        function fecharModalEditar() {
            const modal = document.getElementById('modal-editar');
            if (modal) modal.style.display = 'none';
        }

        function tratarErroAutenticacao(response) {
            if (response && (response.status === 401 || response.status === 403)) {
                localStorage.removeItem('eventhub-token');
                localStorage.removeItem('eventhub-usuario');
                window.showNotification('Sessão inválida. Faça login novamente.', 'error');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 800);
                return true;
            }
            return false;
        }

        document.addEventListener('DOMContentLoaded', () => {
            carregarDadosAdmin();
            preencherEstadosEditar();

            const form = document.getElementById('form-editar');
            if (form) {
                form.addEventListener('submit', salvarAlteracoes);
            }
        });
    </script>
</body>
</html>
