<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Eventos Pendentes | QueDia</title>
    <link rel="stylesheet" href="styles.css?v=20260514">
    <link rel="stylesheet" href="theme.css?v=20260514">
    <link rel="icon" href="https://i.imgur.com/YourIcon.png" type="image/png">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <a href="admin-inicio.html">QueDia</a>
            </div>
            <div class="nav-links">
                <a href="admin-inicio.html">Início</a>
                <a href="admin-evento-cadastro.html">Cadastrar Evento</a>
                <a href="admin-eventos.html" class="active">Aprovações</a>
                <a href="admin-contato.html">Contato</a>
            </div>
            <div class="hamburger-menu" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <main class="container">
        <h1>Eventos Pendentes de Aprovação</h1>
        <div id="admin-notice" class="admin-notice" role="status" aria-live="polite"></div>
        <div id="eventos-container">
            <div class="loading">Carregando eventos...</div>
        </div>
    </main>

    <!-- Modal de Rejeição -->
    <div id="modal-rejeicao" class="modal">
        <div class="modal-content modal-small">
            <h3>Rejeitar Evento</h3>
            <p>Informe o motivo da rejeição:</p>
            <textarea id="motivo-rejeicao" placeholder="Digite o motivo..."></textarea>
            <div id="modal-rejeicao-erro" class="modal-error"></div>
            <div class="modal-actions">
                <button onclick="cancelarRejeicao()">Cancelar</button>
                <button onclick="confirmarRejeicao()" class="btn-danger">Rejeitar</button>
            </div>
        </div>
    </div>

    <div id="modal-confirmacao" class="modal">
        <div class="modal-content modal-small">
            <h3>Confirmar Aprovação</h3>
            <p>Deseja realmente aprovar este evento?</p>
            <div class="modal-actions">
                <button onclick="cancelarAprovacao()">Cancelar</button>
                <button onclick="confirmarAprovacao()" class="btn-success">Aprovar</button>
            </div>
        </div>
    </div>

    <div id="icone-perfil" title="Meu Perfil" onclick="irParaPerfil()" style="cursor: pointer;"></div>
    <script src="global.js"></script>
    <script>
        const API_URL = window.API_URL;
        let eventosPendentes = [];
        let eventoParaRejeitar = null;

        async function carregarEventos() {
            try {
                const token = localStorage.getItem('eventhub-token');
                if (!token) {
                    window.location.href = 'login.html';
                    return;
                }

                const response = await fetch(`${API_URL}/admin/eventos`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.status === 401) {
                    localStorage.removeItem('eventhub-token');
                    localStorage.removeItem('eventhub-usuario');
                    window.location.href = 'login.html';
                    return;
                }

                        if (response.status === 403) {
                    mostrarMensagem('Acesso negado. Você não é administrador.', 'error');
                    window.location.href = 'index.html';
                    return;
                }

                if (!response.ok) {
                    throw new Error('Erro ao carregar eventos');
                }

                eventosPendentes = await response.json();
                renderizarEventos();
            } catch (error) {
                console.error('Erro:', error);
                document.getElementById('eventos-container').innerHTML = '<div class="error">Erro ao carregar eventos</div>';
            }
        }

        function renderizarEventos() {
            const container = document.getElementById('eventos-container');
            
            if (eventosPendentes.length === 0) {
                container.innerHTML = '<div class="no-events">Nenhum evento pendente de aprovação</div>';
                return;
            }

            container.innerHTML = eventosPendentes.map(evento => `
                <div class="evento-card-compact">
                    <div class="evento-compact-header">
                        <img src="${evento.imagens && evento.imagens.length > 0 ? evento.imagens[0] : 'https://via.placeholder.com/200x150?text=Sem+Imagem'}" alt="Capa" class="evento-compact-img">
                        <div class="evento-compact-info">
                            <h3>${evento.nome}</h3>
                            <p><strong>📅</strong> ${formatarData(evento.data)}</p>
                            <p><strong>👤</strong> ${evento.organizador}</p>
                            <p><strong>📍</strong> ${evento.cidade}, ${evento.estado}</p>
                            <p><strong>🏷️</strong> ${evento.categoria}</p>
                        </div>
                    </div>
                    <div class="evento-compact-actions">
                        <button onclick="verEvento('${evento.id || evento._id}');" class="btn-secondary btn-small">Ver</button>
                        <button onclick="mostrarConfirmacaoAprovacao('${evento.id || evento._id}')" class="btn-success btn-small">Aprovar</button>
                        <button onclick="rejeitarEvento('${evento.id || evento._id}')" class="btn-danger btn-small">Rejeitar</button>
                    </div>
                </div>
            `).join('');
        }

        let eventoParaAprovar = null;

        function mostrarMensagem(texto, tipo = 'info') {
            const notice = document.getElementById('admin-notice');
            if (!notice) return;
            notice.textContent = texto;
            notice.className = `admin-notice admin-notice-${tipo}`;
            if (tipo !== 'info') {
                setTimeout(() => {
                    notice.textContent = '';
                    notice.className = 'admin-notice';
                }, 6000);
            }
        }

        function mostrarConfirmacaoAprovacao(eventoId) {
            eventoParaAprovar = eventoId;
            document.getElementById('modal-confirmacao').style.display = 'flex';
        }

        async function confirmarAprovacao() {
            try {
                const token = localStorage.getItem('eventhub-token');
                const response = await fetch(`${API_URL}/admin/eventos/${eventoParaAprovar}/aprovar`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                document.getElementById('modal-confirmacao').style.display = 'none';

                if (response.status === 401) {
                    localStorage.removeItem('eventhub-token');
                    localStorage.removeItem('eventhub-usuario');
                    window.location.href = 'login.html';
                    return;
                }

                const dados = await response.json().catch(() => ({}));
                if (!response.ok) {
                    mostrarMensagem(dados.erro || 'Erro ao aprovar evento', 'error');
                    console.error('Erro ao aprovar evento:', dados);
                    return;
                }

                mostrarMensagem('Evento aprovado com sucesso!', 'success');
                carregarEventos();
            } catch (error) {
                console.error('Erro:', error);
                mostrarMensagem('Erro ao aprovar evento', 'error');
            }
        }

        function cancelarAprovacao() {
            eventoParaAprovar = null;
            document.getElementById('modal-confirmacao').style.display = 'none';
        }

        function rejeitarEvento(eventoId) {
            eventoParaRejeitar = eventoId;
            document.getElementById('motivo-rejeicao').value = '';
            const erroEl = document.getElementById('modal-rejeicao-erro');
            erroEl.textContent = '';
            erroEl.style.display = 'none';
            document.getElementById('modal-rejeicao').style.display = 'flex';
        }

        function cancelarRejeicao() {
            eventoParaRejeitar = null;
            document.getElementById('motivo-rejeicao').value = '';
            const erroEl = document.getElementById('modal-rejeicao-erro');
            erroEl.textContent = '';
            erroEl.style.display = 'none';
            document.getElementById('modal-rejeicao').style.display = 'none';
        }

        function verEvento(eventoId) {
            if (!eventoId) {
                mostrarMensagem('ID do evento inválido.', 'error');
                return;
            }
            window.location.href = `evento-detalhes.html?id=${encodeURIComponent(eventoId)}`;
        }

        async function confirmarRejeicao() {
            const motivo = document.getElementById('motivo-rejeicao').value.trim();
            if (!motivo) {
                const erroEl = document.getElementById('modal-rejeicao-erro');
                erroEl.textContent = 'Informe o motivo da rejeição.';
                erroEl.style.display = 'block';
                return;
            }

            try {
                const token = localStorage.getItem('eventhub-token');
                const response = await fetch(`${API_URL}/admin/eventos/${eventoParaRejeitar}/rejeitar`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ motivo })
                });

                if (response.status === 401) {
                    localStorage.removeItem('eventhub-token');
                    localStorage.removeItem('eventhub-usuario');
                    window.location.href = 'login.html';
                    return;
                }

                const dados = await response.json().catch(() => ({}));
                if (!response.ok) {
                    const erroEl = document.getElementById('modal-rejeicao-erro');
                    erroEl.textContent = dados.erro || 'Erro ao rejeitar evento.';
                    erroEl.style.display = 'block';
                    console.error('Erro ao rejeitar evento:', dados);
                    return;
                }

                mostrarMensagem('Evento rejeitado com sucesso!', 'success');
                cancelarRejeicao();
                carregarEventos();
            } catch (error) {
                console.error('Erro:', error);
                const erroEl = document.getElementById('modal-rejeicao-erro');
                erroEl.textContent = 'Erro ao rejeitar evento. Tente novamente.';
                erroEl.style.display = 'block';
            }
        }

        function formatarData(dataStr) {
            if (!dataStr) return "A definir";
            const isoMatch = dataStr.match(/^(\d{4})-(\d{2})-(\d{2})/);
            if (isoMatch) {
                const data = new Date(isoMatch[1], isoMatch[2] - 1, isoMatch[3]);
                return data.toLocaleDateString('pt-BR');
            }
            return dataStr;
        }

        function logout() {
            localStorage.removeItem('eventhub-token');
            localStorage.removeItem('eventhub-usuario');
            window.location.href = 'login.html';
        }

        function toggleMenu() {
            const navLinks = document.querySelector('.nav-links');
            navLinks.classList.toggle('active');
        }

        // Carregar eventos ao iniciar
        document.addEventListener('DOMContentLoaded', carregarEventos);
    </script>

    <style>
        .evento-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .evento-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .evento-header h3 {
            margin: 0;
            color: var(--cor-principal);
        }

        .evento-data {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .evento-info p {
            margin: 5px 0;
            color: var(--text-primary);
        }

        .evento-imagens {
            margin: 15px 0;
        }

        .evento-thumb {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            margin-right: 10px;
        }

        .evento-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-success {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--bg-primary);
            padding: 20px;
            border-radius: 12px;
            width: min(560px, 100%);
            max-width: 560px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.45);
        }

        .modal-content h3 {
            margin-top: 0;
            color: var(--cor-principal);
        }

        .modal-content textarea {
            width: 100%;
            box-sizing: border-box;
            min-height: 120px;
            margin: 12px 0;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            resize: vertical;
        }

        .modal-small {
            width: min(520px, 92%);
        }

        .modal-error {
            display: none;
            color: #f8d7da;
            background: rgba(220, 53, 69, 0.12);
            padding: 10px 12px;
            border-radius: 8px;
            margin-top: 10px;
            min-height: 28px;
        }

        .admin-notice {
            padding: 12px 16px;
            margin: 20px 0 0;
            border-radius: 12px;
            color: var(--text-primary);
            font-weight: 500;
            display: none;
            transition: all 0.2s ease;
        }

        .admin-notice-info {
            display: block;
            background: rgba(0, 123, 255, 0.12);
            border: 1px solid rgba(0, 123, 255, 0.25);
        }

        .admin-notice-success {
            display: block;
            background: rgba(40, 167, 69, 0.12);
            border: 1px solid rgba(40, 167, 69, 0.25);
            color: #d4edda;
        }

        .admin-notice-error {
            display: block;
            background: rgba(220, 53, 69, 0.12);
            border: 1px solid rgba(220, 53, 69, 0.25);
            color: #f8d7da;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 15px;
        }

        .no-events {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px;
        }

        .loading {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px;
        }

        .error {
            text-align: center;
            color: #dc3545;
            padding: 40px;
        }
    </style>
</body>
</html>
