<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Quedia.com.br</title>
  <link rel="stylesheet" href="styles.css?v=20260424">
  <link rel="stylesheet" href="theme.css?v=20260424">
</head>
<body>
  <div class="container">
    <header>
      <span class="logo-provisoria">Q</span>
      <nav class="menu">
        <a href="index.html">Início</a>
        <a href="event-form.html">Cadastrar Evento</a>
                <a href="sobre.html">Sobre</a>\n<a href="contato.html">Contato</a>
        <a href="meus-eventos.html">Seus Eventos</a>
        <a href="login.html">Login</a>
        <a href="cadastro.html">Cadastro</a>
      </nav>
      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </header>
    
    <nav class="mobile-menu" id="mobile-menu">
      <a href="index.html">Início</a>
      <a href="event-form.html">Cadastrar Evento</a>
              <a href="sobre.html">Sobre</a>\n<a href="contato.html">Contato</a>
      <a href="meus-eventos.html">Seus Eventos</a>
      <a href="login.html">Login</a>
      <a href="cadastro.html">Cadastro</a>
    </nav>
    <main>
      <form id="login-form" class="card-form">
        <label>Email<input type="email" name="email" required></label>
        <label>Senha
          <div style="display: flex; gap: 8px; align-items: center;">
            <input type="password" name="senha" id="senha" required>
            <button type="button" onclick="toggleSenha('senha')" class="toggle-senha-button">👁</button>
          </div>
        </label>
        <button type="submit" class="btn-form-submit">Entrar</button>
      </form>
      <div id="mensagem-login"></div>
      <p style="text-align: center; margin-top: 24px;">Ainda não criou sua conta? <a href="cadastro.html" style="color: var(--text-primary, #00bfff);">Cadastre-se aqui</a></p>
    </main>
  </div>

  <div id="icone-perfil" title="Meu Perfil" onclick="irParaPerfil()" style="cursor: pointer; text-decoration: none;">
    <img id="icone-perfil-img" src="caminho-da-sua-foto.jpg">
  </div>

  <script src="theme.js?v=20260424"></script>
  <script>
    // Função para mostrar/esconder senha
    function toggleSenha(inputId) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
      } else {
        input.type = 'password';
      }
    }
  </script>
  <script src="login.js?v=20260424"></script>
  <script src="global.js?v=20260424"></script>
  <script src="hamburger-menu.js?v=20260424"></script>
</body>
</html>
