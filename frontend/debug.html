<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debug EventHub</title>
  <style>
    body { font-family: Arial; margin: 20px; background: #181a20; color: #fff; }
    .debug { background: #1a2332; padding: 15px; margin: 10px 0; border-left: 4px solid #00bfff; border-radius: 4px; }
    .success { color: #00ff00; }
    .error { color: #ff4444; }
    pre { background: #0a1118; padding: 10px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>🔍 Debug - EventHub</h1>
  
  <div class="debug">
    <h3>1. Carregando scripts...</h3>
    <p id="scripts-status">⏳</p>
  </div>
  
  <div class="debug">
    <h3>2. Funções Disponíveis</h3>
    <p>toggleFiltros: <span id="fn-toggle"></span></p>
    <p>setView: <span id="fn-view"></span></p>
    <p>irParaPerfil: <span id="fn-perfil"></span></p>
    <p>filtrarEventos: <span id="fn-filtrar"></span></p>
  </div>
  
  <div class="debug">
    <h3>3. API_URL</h3>
    <p id="api-url"></p>
  </div>
  
  <div class="debug">
    <h3>4. Teste de Conexão API</h3>
    <button onclick="testarAPI()">Testar API</button>
    <p id="api-test"></p>
  </div>
  
  <div class="debug">
    <h3>5. Console Log</h3>
    <pre id="console-log"></pre>
  </div>

  <script>
    // Interceptar console.log
    const logs = [];
    const originalLog = console.log;
    console.log = function(...args) {
      logs.push(args.join(' '));
      originalLog.apply(console, args);
    };
    
    window.addEventListener('load', () => {
      // Atualizar status de scripts
      document.getElementById('scripts-status').innerHTML = '<span class="success">✓ Scripts carregados</span>';
      
      // Verificar funções
      document.getElementById('fn-toggle').innerHTML = typeof window.toggleFiltros === 'function' ? '<span class="success">✓</span>' : '<span class="error">✗</span>';
      document.getElementById('fn-view').innerHTML = typeof window.setView === 'function' ? '<span class="success">✓</span>' : '<span class="error">✗</span>';
      document.getElementById('fn-perfil').innerHTML = typeof window.irParaPerfil === 'function' ? '<span class="success">✓</span>' : '<span class="error">✗</span>';
      document.getElementById('fn-filtrar').innerHTML = typeof window.filtrarEventos === 'function' ? '<span class="success">✓</span>' : '<span class="error">✗</span>';
      
      // Mostrar API_URL
      document.getElementById('api-url').innerHTML = window.API_URL ? 
        '<span class="success">✓ ' + window.API_URL + '</span>' : 
        '<span class="error">✗ Não definida</span>';
      
      // Mostrar logs
      const logEl = document.getElementById('console-log');
      logEl.textContent = logs.join('\n') || 'Sem logs ainda';
    });
    
    function testarAPI() {
      const el = document.getElementById('api-test');
      el.innerHTML = '⏳ Testando...';
      
      if (!window.API_URL) {
        el.innerHTML = '<span class="error">✗ API_URL não definida</span>';
        return;
      }
      
      fetch(window.API_URL + '/eventos')
        .then(r => {
          el.innerHTML = '<span class="' + (r.ok ? 'success' : 'error') + '">Status: ' + r.status + ' - ' + r.statusText + '</span>';
          return r.json();
        })
        .then(data => {
          el.innerHTML += '<div style="margin-top: 10px;"><span class="success">✓ Resposta recebida:</span><pre>' + JSON.stringify(data, null, 2).substring(0, 200) + '...</pre></div>';
        })
        .catch(e => {
          el.innerHTML = '<span class="error">✗ Erro: ' + e.message + '</span>';
        });
    }
  </script>
  
  <!-- Carregando os scripts reais -->
  <script src="global.js"></script>
  <script src="evento-list.js"></script>
</body>
</html>
