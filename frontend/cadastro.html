<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Quedia.com.br</title>
  <link rel="stylesheet" href="styles.css?v=5">
  <link rel="stylesheet" href="theme.css?v=5">
</head>
<body>
  <div class="container">
    <header>
      <span class="logo-provisoria">Q</span>
      <nav class="menu">
        <a href="index.html">Início</a>
        <a href="event-form.html">Cadastrar Evento</a>
        <a href="contato.html">Contato</a>
        <a href="meus-eventos.html">Seus Eventos</a>
        <a href="login.html">Login</a>
        <a href="cadastro.html">Cadastro</a>
      </nav>
      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </header>
    
    <nav class="mobile-menu" id="mobile-menu">
      <a href="index.html">Início</a>
      <a href="event-form.html">Cadastrar Evento</a>
      <a href="contato.html">Contato</a>
      <a href="meus-eventos.html">Seus Eventos</a>
      <a href="login.html">Login</a>
      <a href="cadastro.html">Cadastro</a>
    </nav>
      <h1 class="logo">Cadastro</h1>
    </header>
    <main>
      <form id="cadastro-form" class="card-form">
        <label>Nome<input type="text" name="nome" required></label>
        
        <label>Email<input type="email" name="email" id="email" required onblur="validarEmail()">
          <small id="email-erro" style="color: #ff6b6b; display: none;"></small>
        </label>
        
        <label>Senha
          <div style="display: flex; gap: 8px; align-items: center;">
            <input type="password" name="senha" id="senha" required>
            <button type="button" onclick="toggleSenha('senha')" class="toggle-senha-button">👁</button>
          </div>
        </label>
        
        <label>Confirmar Senha
          <div style="display: flex; gap: 8px; align-items: center;">
            <input type="password" name="confirmar_senha" id="confirmar-senha" required>
            <button type="button" onclick="toggleSenha('confirmar-senha')" class="toggle-senha-button">👁</button>
          </div>
        </label>
        
        <label>Estado<select name="estado" id="estado" required onchange="atualizarCidades()">
          <option value="">Selecione um estado</option>
        </select></label>
        
        <label>Cidade<select name="cidade" id="cidade" required>
          <option value="">Selecione primeiro um estado</option>
        </select></label>

        <label>Preferências de categorias</label>
        <div id="categorias-cadastro" class="categorias-grid"></div>
        <p id="warning-categorias-cadastro" class="warning-text"></p>

        <button type="submit" class="btn-form-submit">Cadastrar</button>
      </form>
      <div id="mensagem-cadastro"></div>
      <p style="text-align: center; margin-top: 24px;">Já possui uma conta? <a href="login.html" style="color: var(--text-primary, #00bfff);">Faça login</a></p>
    </main>
  </div>

  <div id="icone-perfil" title="Meu Perfil" onclick="irParaPerfil()" style="cursor: pointer; text-decoration: none;">
    <img id="icone-perfil-img" src="caminho-da-sua-foto.jpg">
  </div>

  <script src="theme.js?v=5"></script>
  
  <script src="global.js?v=5"></script>
  
  <script src="estados-cidades.js?v=5"></script>
  <script src="categorias.js?v=5"></script>
  <script src="cadastro.js?v=5"></script>
  <script src="hamburger-menu.js?v=5"></script>
</body>
</html>
