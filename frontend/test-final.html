<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✅ Teste Final - EventHub</title>
  <style>
    body {
      font-family: Arial;
      margin: 20px;
      background: #181a20;
      color: #fff;
    }
    .test-box {
      background: #1a2332;
      padding: 15px;
      margin: 10px 0;
      border-left: 4px solid #00bfff;
      border-radius: 4px;
    }
    .pass { color: #00ff00; font-weight: bold; }
    .fail { color: #ff4444; font-weight: bold; }
    button { padding: 10px 20px; background: #00bfff; color: #000; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin: 5px; }
    button:hover { background: #00a0d6; }
  </style>
</head>
<body>
  <h1>✅ Testes Finais do EventHub</h1>
  
  <div class="test-box">
    <h3>1️⃣ API Conectada</h3>
    <button onclick="testarAPI()">Testar API</button>
    <p id="test-api"></p>
  </div>
  
  <div class="test-box">
    <h3>2️⃣ CORS Funcionando</h3>
    <button onclick="testarCORS()">Testar CORS</button>
    <p id="test-cors"></p>
  </div>
  
  <div class="test-box">
    <h3>3️⃣ Filtro Funcionando</h3>
    <button onclick="testarFiltro()">Testar toggleFiltros()</button>
    <p id="test-filtro"></p>
  </div>
  
  <div class="test-box">
    <h3>4️⃣ Navegação Perfil Funcionando</h3>
    <button onclick="testarPerfil()">Testar irParaPerfil()</button>
    <p id="test-perfil"></p>
  </div>
  
  <div class="test-box">
    <h3>5️⃣ Busca por Gratuito/Gratis</h3>
    <input type="text" id="search-gratuito" placeholder="Digite 'gratuito' ou 'gratis'" style="padding: 8px; width: 300px;">
    <button onclick="testarBuscaGratuito()">Testar Busca</button>
    <p id="test-busca"></p>
  </div>

  <script>
    function testarAPI() {
      const el = document.getElementById('test-api');
      el.innerHTML = '⏳ Testando...';
      
      // Se Global.js está carregado, usar window.API_URL
      const apiUrl = window.API_URL || 'https://eventhub-api-649702844549.us-central1.run.app/api';
      
      fetch(apiUrl + '/eventos', {
        headers: {
          'Origin': window.location.origin
        }
      })
        .then(r => r.json())
        .then(data => {
          el.innerHTML = '<span class="pass">✓ API respondendo: ' + (Array.isArray(data) ? data.length + ' eventos' : 'dados') + '</span>';
        })
        .catch(e => el.innerHTML = '<span class="fail">✗ Erro: ' + e.message + '</span>');
    }
    
    function testarCORS() {
      const el = document.getElementById('test-cors');
      el.innerHTML = '⏳ Testando...';
      
      const apiUrl = window.API_URL || 'https://eventhub-api-649702844549.us-central1.run.app/api';
      
      fetch(apiUrl + '/eventos')
        .then(r => {
          const corsHeader = r.headers.get('Access-Control-Allow-Origin');
          if (corsHeader) {
            el.innerHTML = '<span class="pass">✓ CORS habilitado: ' + corsHeader + '</span>';
          } else {
            el.innerHTML = '<span class="fail">✗ CORS header não encontrado</span>';
          }
        })
        .catch(e => el.innerHTML = '<span class="fail">✗ Erro: ' + e.message + '</span>');
    }
    
    function testarFiltro() {
      const el = document.getElementById('test-filtro');
      if (typeof window.toggleFiltros === 'function') {
        el.innerHTML = '<span class="pass">✓ Função toggleFiltros disponível</span>';
        console.log('Chamando toggleFiltros()...');
        window.toggleFiltros();
      } else {
        el.innerHTML = '<span class="fail">✗ Função toggleFiltros não disponível</span>';
      }
    }
    
    function testarPerfil() {
      const el = document.getElementById('test-perfil');
      if (typeof window.irParaPerfil === 'function') {
        el.innerHTML = '<span class="pass">✓ Função irParaPerfil disponível</span>';
        console.log('Função irParaPerfil está pronta para ser chamada');
      } else {
        el.innerHTML = '<span class="fail">✗ Função irParaPerfil não disponível</span>';
      }
    }
    
    function testarBuscaGratuito() {
      const termo = document.getElementById('search-gratuito').value.toLowerCase();
      const el = document.getElementById('test-busca');
      
      if (!termo.includes('gratuito') && !termo.includes('gratis')) {
        el.innerHTML = '<span class="fail">✗ Digite "gratuito" ou "gratis"</span>';
        return;
      }
      
      // Simular a lógica de busca
      const evento = {
        gratuito: true,
        preco: '0'
      };
      
      function normalizarTexto(texto) {
        if (!texto) return '';
        return texto.toString().normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
      }
      
      const termoNorm = normalizarTexto(termo);
      const match = (termoNorm.includes('gratuito') || termoNorm.includes('gratis')) && 
                    (evento.gratuito || parseFloat(evento.preco || 0) === 0);
      
      if (match) {
        el.innerHTML = '<span class="pass">✓ Busca por "' + termo + '" funcionando</span>';
      } else {
        el.innerHTML = '<span class="fail">✗ Busca falhou</span>';
      }
    }
    
    // Testar automaticamente ao carregar
    window.addEventListener('load', () => {
      console.log('✓ Página de testes carregada');
      console.log('window.API_URL:', window.API_URL);
      console.log('window.toggleFiltros:', typeof window.toggleFiltros);
      console.log('window.irParaPerfil:', typeof window.irParaPerfil);
    });
  </script>
</body>
</html>
