steps:
  # Build da imagem Docker
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/eventhub-api:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/eventhub-api:latest'
      - '-f'
      - 'backend/Dockerfile'
      - 'backend'

  # Push para Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/eventhub-api:$SHORT_SHA'

  # Deploy no Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:latest'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'eventhub-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/eventhub-api:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID,NODE_ENV=production'

images:
  - 'gcr.io/$PROJECT_ID/eventhub-api:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/eventhub-api:latest'

timeout: '1800s'
